<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Blitz Crew Fide Rankings</title>

    <!-- Link preview (Open Graph) — only for /blitzcrewrankings, served via nginx -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Blitz Crew Fide Rankings" />
    <meta property="og:description" content="FIDE rapid ratings and rankings for the blitz crew." />
    <meta property="og:url" content="https://lumna.co/blitzcrewrankings" />

    <!-- PWA manifest -->
    <link rel="manifest" href="/manifest.json" />

    <!-- Theme color for browser UI -->
    <meta name="theme-color" content="#16a34a" />

    <!-- iOS PWA support -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Blitz Crew Fide Rankings" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />

    <!-- Preload Google Identity Services so login button renders instantly -->
    <link rel="preconnect" href="https://accounts.google.com" />
    <link rel="preconnect" href="https://apis.google.com" />
    <script src="https://accounts.google.com/gsi/client" async></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>

    <!-- PWA/offline layer retired: unregister any installed service worker and
         clear its caches so it can't serve stale index.html / chunk references. -->
    <script>
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations()
          .then((regs) => regs.forEach((r) => r.unregister()))
          .catch(() => {});
        if (window.caches) {
          caches.keys().then((keys) => keys.forEach((k) => caches.delete(k))).catch(() => {});
        }
      }
    </script>
  </body>
</html>
