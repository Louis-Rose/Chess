<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LUMNA</title>

    <!-- PWA manifest -->
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />

    <!-- Theme color for browser UI -->
    <meta name="theme-color" content="#16a34a" />

    <!-- iOS PWA support -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="LUMNA" />
    <!-- In production nginx serves dedicated static HTML (fit.html / chess.html)
         for /fit and /chess with the right manifest hard-coded. This swap is a
         dev-server fallback only (and for browsers that honor a JS-set manifest);
         Safari ignores a JS-swapped manifest, which is why the static files exist. -->
    <script>
      (function() {
        var p = location.pathname;
        var m = document.querySelector('link[rel="manifest"]');
        if (p.startsWith('/fit')) {
          if (m) m.href = '/fit-manifest.json';
          var ai = document.querySelector('link[rel="apple-touch-icon"]');
          if (ai) ai.href = '/icons/fit-apple-touch-icon.png';
        }
        else if (p.startsWith('/chess')) {
          if (m) m.href = '/chess-manifest.json';
        }
        // Everything else (the welcome/chooser page and generic LUMNA pages)
        // keeps the default /manifest.json so LUMNA itself can be installed to
        // the home screen. In production "/" is served by the static index.html
        // with this manifest hard-coded, so Safari sees it natively.
      })();
    </script>

    <!-- Preload Google Identity Services so login button renders instantly -->
    <link rel="preconnect" href="https://accounts.google.com" />
    <link rel="preconnect" href="https://apis.google.com" />
    <script src="https://accounts.google.com/gsi/client" async></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>

    <!-- PWA/offline layer retired: unregister any installed service worker and
         clear its caches so it can't serve stale index.html / chunk references. -->
    <script>
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations()
          .then((regs) => regs.forEach((r) => r.unregister()))
          .catch(() => {});
        if (window.caches) {
          caches.keys().then((keys) => keys.forEach((k) => caches.delete(k))).catch(() => {});
        }
      }
    </script>
  </body>
</html>
