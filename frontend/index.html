<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LUMNA</title>

    <!-- PWA manifest -->
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />

    <!-- Theme color for browser UI -->
    <meta name="theme-color" content="#16a34a" />

    <!-- iOS PWA support -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="LUMNA" />
    <script>
      (function() {
        var p = location.pathname;
        var t = 'LUMNA';
        var m = document.querySelector('link[rel="manifest"]');
        if (p.startsWith('/fit')) {
          // Gym PWA — scoped to /fit, opens the gym.
          t = 'Mon Programme';
          if (m) m.href = '/fit-manifest.json';
          var ai = document.querySelector('link[rel="apple-touch-icon"]');
          if (ai) ai.href = '/icons/fit-apple-touch-icon.png';
        }
        else if (p.startsWith('/chess')) {
          // Chess PWA — scoped to /chess, opens the coach app (/chess/app).
          t = 'Chess';
          if (m) m.href = '/chess-manifest.json';
        }
        else if (m) {
          // Chooser and other pages aren't an installable app of their own.
          m.remove();
        }
        document.querySelector('meta[name="apple-mobile-web-app-title"]').content = t;
      })();
    </script>

    <!-- Preload Google Identity Services so login button renders instantly -->
    <link rel="preconnect" href="https://accounts.google.com" />
    <link rel="preconnect" href="https://apis.google.com" />
    <script src="https://accounts.google.com/gsi/client" async></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>

    <!-- PWA/offline layer retired: unregister any installed service worker and
         clear its caches so it can't serve stale index.html / chunk references. -->
    <script>
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations()
          .then((regs) => regs.forEach((r) => r.unregister()))
          .catch(() => {});
        if (window.caches) {
          caches.keys().then((keys) => keys.forEach((k) => caches.delete(k))).catch(() => {});
        }
      }
    </script>
  </body>
</html>
