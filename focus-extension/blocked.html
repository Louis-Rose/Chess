<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Stay focused — LUMNA</title>
    <style>
      :root { color-scheme: dark; }
      html, body { height: 100%; margin: 0; }
      body {
        display: flex; align-items: center; justify-content: center;
        background: #0f172a; color: #e2e8f0;
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      }
      .card {
        max-width: 28rem; padding: 2.5rem; text-align: center;
        border: 1px solid #1e293b; border-radius: 1rem; background: rgba(30, 41, 59, 0.4);
      }
      h1 { margin: 0 0 0.5rem; font-size: 1.5rem; }
      p { margin: 0.25rem 0; color: #94a3b8; }
      .host { color: #34d399; font-weight: 600; }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Stay focused</h1>
      <p><span class="host" id="host"></span> is on your LUMNA Focus block list.</p>
      <p>Turn focus mode off in LUMNA when you really need it.</p>
    </div>
    <script src="blocked.js"></script>
  </body>
</html>
