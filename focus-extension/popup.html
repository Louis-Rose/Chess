<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>LUMNA Focus</title>
    <style>
      :root { color-scheme: dark; }
      body {
        width: 20rem; margin: 0; padding: 1rem;
        background: #0f172a; color: #e2e8f0;
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      }
      h1 { margin: 0 0 0.75rem; font-size: 1rem; }
      label { display: block; margin: 0.75rem 0 0.25rem; font-size: 0.75rem; color: #94a3b8; }
      input {
        width: 100%; box-sizing: border-box; padding: 0.5rem 0.6rem;
        border: 1px solid #334155; border-radius: 0.5rem;
        background: rgba(15, 23, 42, 0.6); color: #e2e8f0; font-size: 0.85rem;
      }
      input:focus { outline: none; border-color: #10b981; }
      button {
        margin-top: 0.9rem; width: 100%; padding: 0.55rem;
        border: 1px solid #334155; border-radius: 0.5rem;
        background: #1e293b; color: #e2e8f0; font-weight: 600; cursor: pointer;
      }
      button:hover { border-color: #10b981; }
      .status { margin-top: 0.9rem; font-size: 0.8rem; color: #94a3b8; }
      .on { color: #34d399; font-weight: 600; }
      .off { color: #94a3b8; }
      .err { color: #fb7185; }
    </style>
  </head>
  <body>
    <h1>LUMNA Focus</h1>

    <label for="token">Connection token</label>
    <input id="token" type="password" placeholder="Paste from lumna.co/focus" autocomplete="off" />

    <label for="apiBase">Server</label>
    <input id="apiBase" type="text" placeholder="https://lumna.co" autocomplete="off" />

    <button id="save">Save &amp; sync</button>

    <div class="status" id="status"></div>

    <script src="popup.js"></script>
  </body>
</html>
