<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>LUMNA Focus</title>
    <style>
      :root { color-scheme: dark; }
      body {
        width: 20rem; margin: 0; padding: 1rem; text-align: center;
        background: #0f172a; color: #e2e8f0;
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      }
      h1 { margin: 0 0 0.75rem; font-size: 1rem; }
      label { display: block; margin: 0.75rem 0 0.25rem; font-size: 0.75rem; color: #94a3b8; }
      input {
        width: 100%; box-sizing: border-box; padding: 0.5rem 0.6rem; margin: 0;
        border: 1px solid #334155; border-radius: 0.5rem;
        background: rgba(15, 23, 42, 0.6); color: #e2e8f0; font-size: 0.85rem;
      }
      input:focus { outline: none; border-color: #10b981; }
      .field { position: relative; }
      .field input { padding-right: 2.2rem; }
      .reveal {
        position: absolute; top: 50%; right: 0.4rem; transform: translateY(-50%);
        margin: 0; width: auto; padding: 0.2rem; border: none; background: transparent;
        color: #94a3b8; cursor: pointer; line-height: 0;
      }
      .reveal:hover { color: #e2e8f0; border: none; }
      button {
        margin-top: 0.9rem; width: 100%; padding: 0.55rem;
        border: 1px solid #334155; border-radius: 0.5rem;
        background: #1e293b; color: #e2e8f0; font-weight: 600; cursor: pointer;
      }
      button:hover { border-color: #10b981; }
      button.secondary {
        margin-top: 0.6rem; width: auto; padding: 0.15rem 0.9rem; background: transparent;
        color: #94a3b8; font-weight: 500; font-size: 0.78rem;
      }
      button.secondary:hover { color: #e2e8f0; border-color: #475569; }

      /* Connected view */
      .row {
        display: flex; align-items: center; justify-content: center; gap: 0.75rem;
        margin-top: 0.25rem;
      }
      .row .label { font-size: 0.95rem; font-weight: 600; }
      .switch {
        position: relative; margin: 0; width: 2.6rem; height: 1.5rem; padding: 0;
        border: none; border-radius: 999px; background: #475569; cursor: pointer;
      }
      .switch:hover { border: none; }
      .switch[aria-checked="true"] { background: #10b981; }
      .switch .knob {
        position: absolute; top: 0.15rem; left: 0.15rem; width: 1.2rem; height: 1.2rem;
        border-radius: 50%; background: #fff; transition: left 0.15s;
      }
      .switch[aria-checked="true"] .knob { left: 1.25rem; }

      .list {
        display: flex; flex-wrap: wrap; gap: 0.4rem; justify-content: center;
        margin-top: 0.85rem;
      }
      .chip {
        display: inline-flex; align-items: center; gap: 0.35rem;
        padding: 0.2rem 0.3rem 0.2rem 0.55rem; border: 1px solid #334155;
        border-radius: 0.5rem; font-size: 0.8rem; color: #cbd5e1;
      }
      .chip button {
        all: unset; cursor: pointer; color: #64748b; font-size: 1rem; line-height: 1;
        padding: 0 0.15rem;
      }
      .chip button:hover { color: #fb7185; }
      .empty { margin: 0; font-size: 0.8rem; color: #64748b; }

      /* Container holding the blocked-site chips and the add row. */
      .blockbox {
        margin-top: 0.85rem; padding: 0.6rem;
        border: 1px solid #334155; border-radius: 0.6rem;
        background: rgba(15, 23, 42, 0.4);
      }
      .blockbox .list { margin-top: 0; }

      .addrow { display: flex; gap: 0.4rem; margin-top: 0.6rem; }
      /* Input + Add button sized to the same height as the chips above. */
      .addrow input { flex: 1; padding: 0.2rem 0.55rem; font-size: 0.8rem; }
      .addrow button { margin: 0; width: auto; padding: 0.2rem 0.8rem; font-size: 0.8rem; }

      /* Bottom button row: Change token + Reload extension, side by side. */
      .actions { display: flex; gap: 0.5rem; justify-content: center; margin-top: 0.9rem; }
      .actions button { margin-top: 0; }

      .status { margin-top: 0.9rem; font-size: 0.8rem; color: #94a3b8; }
      .time { margin-top: 0.15rem; font-size: 0.72rem; color: #64748b; }
      .on { color: #34d399; font-weight: 600; }
      .off { color: #94a3b8; }
      .err { color: #fb7185; }
      [hidden] { display: none; }
    </style>
  </head>
  <body>
    <h1>LUMNA Focus</h1>

    <!-- Setup: shown until a token is saved (or when the token needs fixing). -->
    <section id="setup" hidden>
      <label for="token">Connection token</label>
      <div class="field">
        <input id="token" type="password" placeholder="Paste from lumna.co/focus" autocomplete="off" />
        <button id="toggleToken" class="reveal" type="button" aria-label="Show token"></button>
      </div>
      <button id="save">Save &amp; sync</button>
      <div class="status" id="setupStatus"></div>
    </section>

    <!-- Connected: the toggle + blocked list, fed by the saved token. -->
    <section id="connected" hidden>
      <div class="row">
        <span class="label">Blocking</span>
        <button id="blockToggle" class="switch" role="switch" aria-checked="false" aria-label="Blocking">
          <span class="knob"></span>
        </button>
      </div>

      <div class="blockbox">
        <div class="list" id="list"></div>
        <p class="empty" id="empty" hidden>No sites yet.</p>

        <form id="addForm" class="addrow">
          <input id="addInput" type="text" placeholder="e.g. reddit.com" autocomplete="off" />
          <button type="submit">Add</button>
        </form>
      </div>

      <div class="status" id="status"></div>

      <div class="actions">
        <button id="change" class="secondary">Change token</button>
        <button id="reload" class="secondary" title="Restart the extension and reload its code from disk">
          Reload extension
        </button>
      </div>
    </section>

    <script src="popup.js"></script>
  </body>
</html>
