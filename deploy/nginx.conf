# HTTP - redirect to HTTPS
server {
    listen 80;
    server_name lumna.co www.lumna.co;
    return 301 https://$host$request_uri;
}

# Old domain HTTP - redirect to new domain
server {
    listen 80;
    server_name improveatstuff.io www.improveatstuff.io;
    return 301 https://lumna.co$request_uri;
}

# Old domain HTTPS - redirect to new domain (preserves path)
server {
    listen 443 ssl;
    server_name improveatstuff.io www.improveatstuff.io;

    ssl_certificate /etc/letsencrypt/live/improveatstuff.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/improveatstuff.io/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://lumna.co$request_uri;
}

# HTTPS - serve the app
server {
    listen 443 ssl;
    server_name lumna.co www.lumna.co;

    ssl_certificate /etc/letsencrypt/live/lumna.co/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/lumna.co/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Serve frontend
    root /home/azureuser/Chess/frontend/dist;
    index index.html;

    # PostHog reverse proxy (bypasses ad blockers) — must be before location /
    location ^~ /ph/ {
        proxy_pass https://eu.i.posthog.com/;
        proxy_set_header Host eu.i.posthog.com;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_ssl_server_name on;
        proxy_ssl_name eu.i.posthog.com;
        proxy_buffering off;
    }

    # Content-hashed build assets (filename changes every build) — safe to cache
    # forever. Must come before the HTML/SPA locations below.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # HTML entry points must ALWAYS revalidate. Without this the browser/PWA
    # heuristically caches the HTML, keeps pointing at old (deleted) asset
    # hashes, and the app never updates. "no-cache" still allows a cheap ETag
    # 304 — it just forbids serving the cached copy without checking first.

    # Public crew rankings page: serve the build with its own link-preview tags
    # (Open Graph) for this exact path only, so the Messenger pin shows the crew
    # name instead of "LUMNA". Still the same SPA underneath.
    location = /blitzcrewrankings {
        add_header Cache-Control "no-cache" always;
        try_files /blitzcrewrankings.html =404;
    }

    # Per-app PWA entry points: serve dedicated HTML with the right manifest
    # hard-coded (Safari ignores a JS-swapped manifest). The exact + /-prefix
    # pairs match /fit, /fit/* and /chess, /chess/* without catching the
    # /fit-manifest.json and /chess-manifest.json files (they start with
    # "/fit-" and "/chess-", not "/fit/" or "/chess/").
    location = /fit { add_header Cache-Control "no-cache" always; try_files /fit.html =404; }
    location ^~ /fit/ { add_header Cache-Control "no-cache" always; try_files /fit.html =404; }
    location = /chess { add_header Cache-Control "no-cache" always; try_files /chess.html =404; }
    location ^~ /chess/ { add_header Cache-Control "no-cache" always; try_files /chess.html =404; }

    location / {
        add_header Cache-Control "no-cache" always;
        try_files $uri $uri/ /index.html;
    }

    # Proxy API requests to backend
    location /api {
        # Page-classification posts a block of rendered page images (base64) in
        # one request, which blows past nginx's 1 MB default. Without this nginx
        # rejects the request with 413 before it ever reaches the backend.
        client_max_body_size 25m;

        proxy_pass http://127.0.0.1:5001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE support
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
        proxy_http_version 1.1;
        proxy_set_header Connection '';
        chunked_transfer_encoding off;
    }
}
